version: '3.9'

networks:
  stackshift-net:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:
  rabbitmq_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:

services:

  # ──────────────────────────────────────────────
  # DATABASE — PostgreSQL 16 + pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stacksift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stacksift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      POSTGRES_DB: ${POSTGRES_DB:-stacksift}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacksift}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # SEARCH & LOG INDEXING — Elasticsearch 8.12.0
  # ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: stacksift-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # CACHING & SIGNALR BACKPLANE — Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: stacksift-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MESSAGE BROKER — RabbitMQ
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stacksift-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-stacksift}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-stacksift_secret}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # IDENTITY PROVIDER — Keycloak
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: stacksift-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stacksift}
      KC_DB_USERNAME: ${POSTGRES_USER:-stacksift}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # METRICS — Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stacksift-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - stacksift-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ──────────────────────────────────────────────
  # DASHBOARDS — Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stacksift-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_secret}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # UPTIME MONITORING — Uptime Kuma
  # ──────────────────────────────────────────────
  uptime-kuma:
    image: ghcr.io/louislam/uptime-kuma:1
    container_name: stacksift-uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - stacksift-net
